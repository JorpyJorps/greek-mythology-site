<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Myth Story | Miles' Greek Mythology Explorer</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=50" />
  </head>
  <body class="quest-page">
    <div class="site-shell">
      <header class="hero quest-hero">
        <nav class="topbar quest-topbar">
          <div class="brand">
            <span class="brand-mark">Ω</span>
            <div>
              <p class="eyebrow">Miles' Myth Stories</p>
              <h1 id="story-page-title">Myth Story</h1>
            </div>
          </div>
          <div class="top-links">
            <a href="./index.html">Home</a>
            <a href="./games.html">Games</a>
          </div>
        </nav>
      </header>

      <main>
        <section class="story-strip">
          <div class="quest-stage">
            <div class="quest-stage-glow quest-stage-glow-left" aria-hidden="true"></div>
            <div class="quest-stage-glow quest-stage-glow-right" aria-hidden="true"></div>
            <div class="quest-stage-fog" aria-hidden="true"></div>

            <article class="quest-chamber">
              <div class="quest-chamber-top">
                <div class="quest-badges" id="story-badges">
                  <span>Reading: Story Time</span>
                </div>
                <p class="detail-kicker quest-scene-label" id="story-level">2nd grade reading</p>
              </div>

              <h2 class="quest-chamber-title" id="story-title">Choose a story from the home page.</h2>
              <div class="story-reading-copy" id="story-body">
                <p>Go back to the home page and click a Cool Story card to open a fuller version here.</p>
              </div>

              <div class="quiz-actions">
                <a class="button button-gold" href="./index.html">Back To Home</a>
              </div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./story.js?v=1"></script>
    <script src="/nav.js"></script>
  </body>
</html>
