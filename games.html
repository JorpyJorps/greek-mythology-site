<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games Arena | Miles' Myth Wiki</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=40" />
  </head>
  <body class="page-games">

    <!-- flash effect shared across games -->
    <div class="math-storm-flash" id="games-flash" aria-hidden="true">
      <div class="math-storm-bolt">⚡</div>
    </div>

    <!-- ── GAME PICKER ─────────────────────────── -->
    <section class="games-picker" id="games-picker">
      <nav class="games-topbar">
        <a href="/index.html" class="math-back pixel">◀</a>
        <div class="games-hud-counts pixel">
          ⚡ <span id="picker-bolts">0</span>
          &nbsp;&nbsp;
          📜 <span id="picker-scrolls">0</span>
        </div>
      </nav>
      <h1 class="quest-picker-title pixel">GAMES ARENA</h1>
      <div class="games-grid">
        <button class="game-tile" data-game="trivia">
          <span class="game-tile-icon">⚡</span>
          <span class="game-tile-name pixel">TRIVIA</span>
          <span class="game-tile-earn pixel">earns ⚡</span>
        </button>
        <button class="game-tile" data-game="memory">
          <span class="game-tile-icon">🧠</span>
          <span class="game-tile-name pixel">MEMORY</span>
          <span class="game-tile-earn pixel">earns ⚡</span>
        </button>
        <button class="game-tile" data-game="battle">
          <span class="game-tile-icon">⚔️</span>
          <span class="game-tile-name pixel">BATTLE</span>
          <span class="game-tile-earn pixel">earns ⚡</span>
        </button>
        <button class="game-tile" data-game="wordsearch">
          <span class="game-tile-icon">🔎</span>
          <span class="game-tile-name pixel">WORDS</span>
          <span class="game-tile-earn pixel">earns 📜</span>
        </button>
      </div>
    </section>

    <!-- ── TRIVIA ───────────────────────────────── -->
    <section class="game-panel" id="panel-trivia" hidden>
      <nav class="games-topbar">
        <button class="math-back pixel" id="back-trivia" type="button">◀</button>
        <div class="quest-step-hud pixel" id="trivia-progress">1 / 10</div>
        <div class="math-bolt-hud pixel">⚡ <span id="trivia-bolt-count">0</span></div>
      </nav>
      <div class="math-arena trivia-arena">
        <div class="math-skill-symbol pixel" id="trivia-cat-tag">?</div>
        <p class="trivia-question" id="trivia-question">Loading…</p>
        <div class="trivia-options" id="trivia-options"></div>
        <p class="math-feedback pixel" id="trivia-feedback" aria-live="polite">&nbsp;</p>
      </div>
      <footer class="math-footer">
        <div class="math-daily-track">
          <div class="math-daily-fill" id="trivia-bolt-fill"></div>
        </div>
        <p class="math-daily-label pixel" id="trivia-bolt-label">0 BOLTS TODAY</p>
      </footer>
    </section>

    <!-- ── MEMORY MATCH ────────────────────────── -->
    <section class="game-panel" id="panel-memory" hidden>
      <nav class="games-topbar">
        <button class="math-back pixel" id="back-memory" type="button">◀</button>
        <div class="quest-step-hud pixel" id="memory-status">MEMORY MATCH</div>
        <div class="math-bolt-hud pixel">⚡ <span id="memory-bolt-count">0</span></div>
      </nav>
      <div class="memory-controls">
        <div class="game-cat-row">
          <button class="game-cat-btn pixel is-selected" type="button" data-memory-level="normal">4×4</button>
          <button class="game-cat-btn pixel" type="button" data-memory-level="hard">6×4</button>
        </div>
        <button class="button button-outline pixel" type="button" id="memory-reset">NEW GAME</button>
      </div>
      <div class="memory-grid" id="memory-grid"></div>
    </section>

    <!-- ── BATTLE CARDS ────────────────────────── -->
    <section class="game-panel" id="panel-battle" hidden>
      <nav class="games-topbar">
        <button class="math-back pixel" id="back-battle" type="button">◀</button>
        <span class="quest-step-hud pixel" id="battle-phase-label">BATTLE</span>
        <div class="math-bolt-hud pixel">⚡ <span id="battle-bolt-count">0</span></div>
      </nav>

      <!-- ── Pick screen ── -->
      <div class="bp-select" id="bp-select">
        <p class="pixel bp-pick-hint">CHOOSE YOUR HERO</p>
        <div class="bp-hero-grid" id="bp-hero-grid"></div>
        <p class="pixel bp-pick-hint bp-pick-hint-vs" id="bp-vs-hint" hidden>VS — CHOOSE YOUR FOE</p>
        <div class="bp-monster-grid" id="bp-monster-grid" hidden></div>
        <button class="button button-gold pixel bp-go-btn" id="bp-go-btn" hidden>FIGHT!</button>
      </div>

      <!-- ── Fight screen ── -->
      <div class="bp-fight" id="bp-fight" hidden>

        <div class="bp-enemy-row">
          <div class="bp-name-bar">
            <span class="pixel bp-cname" id="bp-enemy-name">—</span>
            <div class="bp-hp-track"><div class="bp-hp-fill" id="bp-enemy-hp-fill"></div></div>
            <span class="pixel bp-hp-num" id="bp-enemy-hp-num">—</span>
          </div>
          <div class="bp-sprite bp-sprite-enemy" id="bp-enemy-sprite" aria-hidden="true"></div>
        </div>

        <div class="bp-hero-row">
          <div class="bp-sprite bp-sprite-hero" id="bp-hero-sprite" aria-hidden="true"></div>
          <div class="bp-name-bar bp-name-bar-hero">
            <span class="pixel bp-cname" id="bp-hero-name">—</span>
            <div class="bp-hp-track"><div class="bp-hp-fill bp-hp-fill-hero" id="bp-hero-hp-fill"></div></div>
            <span class="pixel bp-hp-num" id="bp-hero-hp-num">—</span>
          </div>
        </div>

        <div class="bp-msgbox retro-box" id="bp-msgbox">
          <p class="bp-msg" id="bp-msg">What will your hero do?</p>
        </div>

        <div class="bp-moves" id="bp-moves"></div>

        <div class="bp-end-actions" id="bp-end-actions" hidden>
          <button class="button button-gold pixel" type="button" id="bp-rematch">REMATCH!</button>
          <button class="button button-outline pixel" type="button" id="bp-new-match">NEW MATCH</button>
        </div>

      </div>
    </section>

    <!-- ── WORD SEARCH ─────────────────────────── -->
    <section class="game-panel" id="panel-wordsearch" hidden>
      <nav class="games-topbar">
        <button class="math-back pixel" id="back-wordsearch" type="button">◀</button>
        <div class="quest-step-hud pixel" id="wordsearch-status">FIND ALL 6</div>
        <div class="math-bolt-hud pixel">📜 <span id="wordsearch-scroll-count">0</span></div>
      </nav>
      <div class="wordsearch-controls">
        <div class="game-cat-row" id="wordsearch-categories">
          <button class="game-cat-btn pixel is-selected" type="button" data-wordsearch-category="mixed">ALL</button>
          <button class="game-cat-btn pixel" type="button" data-wordsearch-category="gods">GODS</button>
          <button class="game-cat-btn pixel" type="button" data-wordsearch-category="heroes">HEROES</button>
          <button class="game-cat-btn pixel" type="button" data-wordsearch-category="monsters">BEASTS</button>
        </div>
        <button class="button button-outline pixel" type="button" id="wordsearch-reset">NEW PUZZLE</button>
      </div>
      <div class="wordsearch-shell">
        <article class="wordsearch-panel">
          <div class="wordsearch-grid" id="wordsearch-grid" aria-label="Word search puzzle"></div>
        </article>
        <article class="wordsearch-side">
          <div class="wordsearch-list" id="wordsearch-list"></div>
        </article>
      </div>
    </section>

    <script src="/nav.js"></script>
    <script type="module" src="./games.js?v=21"></script>
  </body>
</html>
