<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minotaur Maze | Miles' Myth Wiki</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=50" />
  </head>
  <body class="page-maze">

    <!-- Full-screen overlay: locked / level clear / caught / final win -->
    <div class="maze-overlay" id="maze-overlay">
      <div class="maze-card retro-box">
        <div class="maze-o-icon" id="maze-o-icon">🏛️</div>
        <h2 class="maze-o-title pixel" id="maze-o-title">LOADING</h2>
        <p class="maze-o-msg" id="maze-o-msg"></p>
        <button class="button button-gold pixel" id="maze-o-btn" type="button">GO</button>
        <button class="button button-outline pixel" id="maze-o-btn2" type="button" hidden>SECOND</button>
      </div>
    </div>

    <div class="maze-shell">

      <!-- Top bar -->
      <nav class="maze-topbar">
        <a href="/index.html" class="math-back home-btn pixel">🏛️ HOME</a>
        <div class="maze-hud-center pixel" id="maze-hud-level">HEDGE LABYRINTH · LVL 1</div>
        <div class="maze-hud-right pixel">
          <span id="maze-hud-lives">❤️❤️</span>
          &nbsp;&nbsp;
          <span id="maze-hud-relics">⭐ 0 / 3</span>
        </div>
      </nav>

      <!-- Canvas + D-pad -->
      <div class="maze-game-wrap">
        <canvas id="maze-canvas"></canvas>

        <!-- Mobile D-pad (CSS shows only on touch devices) -->
        <div class="maze-dpad" id="maze-dpad">
          <button class="dpad-btn" data-dir="up"    type="button">▲</button>
          <button class="dpad-btn" data-dir="left"  type="button">◀</button>
          <div class="dpad-center"></div>
          <button class="dpad-btn" data-dir="right" type="button">▶</button>
          <button class="dpad-btn" data-dir="down"  type="button">▼</button>
        </div>
      </div>

      <!-- Status bar -->
      <div class="maze-statusbar pixel" id="maze-hud-status">FIND THE RELICS!</div>

    </div>

    <script src="/nav.js"></script>
    <script src="./secret-challenge.js?v=16"></script>
  </body>
</html>
