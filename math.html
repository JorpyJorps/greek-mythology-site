<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Quest | Miles' Myth Wiki</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=51" />
  </head>
  <body class="page-math">

    <!-- lightning flash on milestone -->
    <div class="math-storm-flash" id="math-storm-flash" aria-hidden="true">
      <div class="math-storm-bolt">⚡</div>
    </div>

    <!-- secret unlock celebration -->
    <div class="math-chest-flash" id="math-chest-flash" aria-hidden="true">
      <div class="math-chest-card retro-box">
        <div class="math-chest-icon">🏛️</div>
        <h3 id="math-chest-title" class="pixel">MAZE UNLOCKED!</h3>
        <a class="button button-gold pixel" href="./secret-challenge.html">ENTER MAZE</a>
      </div>
    </div>

    <div class="math-screen">

      <!-- top bar -->
      <nav class="math-topbar">
        <a href="/index.html" class="math-back home-btn pixel">🏛️ HOME</a>
        <div class="math-bolt-hud pixel">
          ⚡ <span id="bolt-count">0</span>
        </div>
        <div class="math-streak-hud" id="streak-hud" aria-label="Streak">
          ●●●●●
        </div>
        <button class="math-sfx-btn" id="math-sfx-btn" type="button" aria-label="Toggle sound">🔊</button>
      </nav>

      <!-- question area -->
      <main class="math-arena">
        <div class="math-level-row">
          <div class="math-level-badge pixel" id="math-level-badge">LVL 1</div>
          <button class="math-level-up pixel" id="math-level-up" type="button" title="Level up">▲</button>
        </div>
        <div class="math-problem" id="math-problem"></div>
        <div class="math-options" id="math-options"></div>
        <p class="math-feedback pixel" id="math-feedback" aria-live="polite">&nbsp;</p>
      </main>

      <!-- bottom bolt bar -->
      <footer class="math-footer">
        <div class="math-daily-track">
          <div class="math-daily-fill" id="math-daily-fill"></div>
        </div>
        <p class="math-daily-label pixel" id="math-daily-label">0 BOLTS TODAY</p>
      </footer>

    </div>

    <script src="/nav.js"></script>
    <script type="module" src="./math.js?v=29"></script>
  </body>
</html>
