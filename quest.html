<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reading Quest | Miles' Myth Wiki</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css?v=47" />
  </head>
  <body class="page-quest">

    <!-- scroll earn flash -->
    <div class="quest-scroll-flash" id="quest-scroll-flash" aria-hidden="true">
      <div class="quest-scroll-card retro-box">
        <div class="quest-scroll-icon">📜</div>
        <p class="pixel" id="quest-scroll-msg">+3 SCROLLS!</p>
      </div>
    </div>

    <div class="quest-screen">

      <!-- ── PICKER PHASE ── -->
      <section class="quest-picker" id="quest-picker">
        <nav class="quest-topbar">
          <a href="/index.html" class="math-back home-btn pixel">🏛️ HOME</a>
          <div class="math-bolt-hud pixel">📜 <span id="scroll-count-picker">0</span></div>
        </nav>
        <h1 class="quest-picker-title pixel">CHOOSE YOUR HERO</h1>
        <div class="quest-hero-grid" id="quest-hero-grid"></div>
      </section>

      <!-- ── READER PHASE ── -->
      <section class="quest-reader" id="quest-reader" hidden>

        <nav class="quest-topbar">
          <button class="math-back pixel" id="quest-back-btn" type="button">◀</button>
          <div class="quest-step-hud pixel" id="quest-step-hud">1 / 6</div>
          <div class="math-bolt-hud pixel">📜 <span id="scroll-count-reader">0</span></div>
        </nav>

        <article class="quest-chamber">
          <div class="quest-stage-glow quest-stage-glow-left"  aria-hidden="true"></div>
          <div class="quest-stage-glow quest-stage-glow-right" aria-hidden="true"></div>

          <h2 class="quest-chamber-title pixel" id="quest-title">—</h2>
          <p class="quest-story-copy" id="quest-text"></p>

          <div class="quest-choice-stack" id="quest-choice-stack"></div>

          <!-- ending -->
          <div class="quest-ending" id="quest-ending" hidden>
            <p class="quest-ending-kicker pixel" id="quest-ending-kicker">ENDING</p>
            <h3 class="quest-ending-title" id="quest-ending-title"></h3>
            <p class="quest-ending-text" id="quest-ending-text"></p>
            <p class="quest-ending-epilogue" id="quest-ending-epilogue" hidden></p>
            <div class="quest-end-actions">
              <button class="button button-gold pixel" type="button" id="quest-replay">PLAY AGAIN</button>
              <button class="button button-outline pixel" type="button" id="quest-new">NEW HERO</button>
            </div>
          </div>
        </article>

      </section>

    </div>

    <script src="/nav.js"></script>
    <script type="module" src="./quest.js?v=11"></script>
  </body>
</html>
